<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#a8e063" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mission Control" />
  <title>Mission Control</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f12; --card: #161a20; --card-active: #1a2318;
      --border: #252b34; --text: #e8eaf0; --muted: #5a6275;
      --accent: #a8e063; --accent2: #38b2f5; --danger: #f56565;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow: hidden; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    button { font-family: var(--font-body); }
    input[type=checkbox] { accent-color: var(--accent); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── DATA ────────────────────────────────────────────────────────────────

    const MEALS = {
      breakfast: [
        { id:"b1", name:"Oat Power Bowl", desc:"Oats + banana + milk + 2 boiled eggs", protein:28, kcal:420, prep:"8 min" },
        { id:"b2", name:"Egg & Curd Plate", desc:"3 scrambled eggs + curd + fruit bowl", protein:32, kcal:380, prep:"10 min" },
        { id:"b3", name:"Protein Banana Shake", desc:"Milk + banana + oats + 2 eggs blended", protein:30, kcal:400, prep:"5 min" },
        { id:"b4", name:"Quinoa Breakfast Bowl", desc:"Quinoa + milk + banana + honey", protein:22, kcal:390, prep:"12 min" },
        { id:"b5", name:"Egg Oat Skillet", desc:"Oats + 3 eggs + fruits", protein:31, kcal:410, prep:"10 min" },
      ],
      lunch: [
        { id:"l1", name:"Chicken & Lentil Bowl", desc:"Air-fried chicken + lentil dal + quinoa", protein:52, kcal:560, prep:"20 min" },
        { id:"l2", name:"Quinoa Veggie Power", desc:"Quinoa + air-fried vegetables + curd", protein:28, kcal:480, prep:"15 min" },
        { id:"l3", name:"Lentil Soup + Chicken", desc:"Red lentil soup + air-fried chicken strips", protein:48, kcal:520, prep:"18 min" },
        { id:"l4", name:"High-Protein Egg Rice", desc:"Quinoa fried rice + 3 eggs + vegetables", protein:36, kcal:510, prep:"15 min" },
        { id:"l5", name:"Chicken Curd Bowl", desc:"Air-fried chicken + curd marinade + salad", protein:50, kcal:490, prep:"20 min" },
      ],
      dinner: [
        { id:"d1", name:"Lean Chicken Plate", desc:"Air-fried chicken + air-fried veggies + lentils", protein:48, kcal:490, prep:"20 min" },
        { id:"d2", name:"Lentil & Egg Comfort", desc:"Lentil stew + 2 boiled eggs + oats roti", protein:38, kcal:450, prep:"15 min" },
        { id:"d3", name:"Quinoa Chicken Bowl", desc:"Quinoa + grilled air-fried chicken + curd dip", protein:50, kcal:520, prep:"20 min" },
        { id:"d4", name:"Veggie Protein Bowl", desc:"Air-fried vegetables + lentils + quinoa", protein:30, kcal:440, prep:"15 min" },
        { id:"d5", name:"Egg & Veggie Skillet", desc:"4 eggs + air-fried vegetables + lentil soup", protein:40, kcal:460, prep:"15 min" },
      ],
      snack: [
        { id:"s1", name:"Banana + Curd", desc:"1 banana + 1 cup curd", protein:10, kcal:180, prep:"2 min" },
        { id:"s2", name:"Boiled Eggs + Fruit", desc:"2 boiled eggs + seasonal fruits", protein:14, kcal:200, prep:"5 min" },
        { id:"s3", name:"Oat Milk Shake", desc:"Oats + milk + banana", protein:12, kcal:210, prep:"5 min" },
        { id:"s4", name:"Fruit Bowl", desc:"Mixed seasonal fruits", protein:4, kcal:150, prep:"3 min" },
      ],
    };

    const WORKOUTS = [
      { id:"w1", day:"Monday",    type:"weights", label:"PUSH DAY",        icon:"🏋️", mission:"Chest, Shoulders & Triceps",
        exercises:[{name:"Bench Press",sets:"4×8",rest:"90s"},{name:"Overhead Press",sets:"3×10",rest:"90s"},{name:"Incline DB Press",sets:"3×12",rest:"60s"},{name:"Lateral Raises",sets:"3×15",rest:"45s"},{name:"Tricep Pushdown",sets:"3×12",rest:"45s"}] },
      { id:"w2", day:"Tuesday",   type:"weights", label:"PULL DAY",        icon:"💪", mission:"Back & Biceps",
        exercises:[{name:"Deadlift",sets:"4×5",rest:"120s"},{name:"Barbell Row",sets:"4×8",rest:"90s"},{name:"Lat Pulldown",sets:"3×12",rest:"60s"},{name:"Face Pulls",sets:"3×15",rest:"45s"},{name:"Hammer Curls",sets:"3×12",rest:"45s"}] },
      { id:"w3", day:"Wednesday", type:"walk",    label:"ACTIVE RECOVERY", icon:"🚶", mission:"30–45 min walk + mobility",
        exercises:[{name:"Brisk Walk",sets:"30–45 min",rest:"—"},{name:"Hip Circles",sets:"2×10",rest:"30s"},{name:"Shoulder Rolls",sets:"2×10",rest:"30s"},{name:"Calf Stretch",sets:"2×30s",rest:"—"}] },
      { id:"w4", day:"Thursday",  type:"weights", label:"LEGS DAY",        icon:"🦵", mission:"Quads, Hamstrings & Glutes",
        exercises:[{name:"Squat",sets:"4×8",rest:"120s"},{name:"Romanian Deadlift",sets:"3×10",rest:"90s"},{name:"Leg Press",sets:"3×12",rest:"60s"},{name:"Leg Curl",sets:"3×12",rest:"60s"},{name:"Calf Raises",sets:"4×15",rest:"45s"}] },
      { id:"w5", day:"Friday",    type:"weights", label:"UPPER BODY",      icon:"🔥", mission:"Full Upper + Core",
        exercises:[{name:"Pull-Ups",sets:"4×max",rest:"90s"},{name:"DB Shoulder Press",sets:"3×10",rest:"60s"},{name:"Cable Row",sets:"3×12",rest:"60s"},{name:"Chest Flyes",sets:"3×12",rest:"45s"},{name:"Plank",sets:"3×45s",rest:"30s"}] },
      { id:"w6", day:"Saturday",  type:"walk",    label:"LONG WALK",       icon:"🌅", mission:"45–60 min outdoor walk",
        exercises:[{name:"Outdoor Walk",sets:"45–60 min",rest:"—"},{name:"Bodyweight Squats",sets:"2×15",rest:"30s"},{name:"Push-Ups",sets:"2×15",rest:"30s"}] },
      { id:"w7", day:"Sunday",    type:"rest",    label:"REST & RESET",    icon:"🧘", mission:"Rest, stretch, meal prep",
        exercises:[{name:"Light Stretching",sets:"10–15 min",rest:"—"},{name:"Meal Prep",sets:"Weekly",rest:"—"}] },
    ];

    const TARGETS = { protein:150, kcal:1900, water:8 };
    const XP = { meal:20, workout:60, walk:30, water:5 };
    const RANKS = [
      {name:"Recruit",    min:0,    icon:"🪖"},
      {name:"Operative",  min:200,  icon:"🎯"},
      {name:"Specialist", min:500,  icon:"⚔️"},
      {name:"Veteran",    min:1000, icon:"🛡️"},
      {name:"Elite",      min:2000, icon:"🔱"},
      {name:"Commander",  min:3500, icon:"🌟"},
    ];

    const DEFAULT_REMINDERS = [
      { id:"r1", label:"Morning check-in",  time:"07:30", message:"Good morning, Operative! Log your breakfast and start strong. 💪", enabled:true },
      { id:"r2", label:"Lunch reminder",    time:"12:30", message:"Midday mission check — log your lunch and hit that protein target! 🍽️", enabled:true },
      { id:"r3", label:"Workout time",      time:"17:00", message:"It's go time. Your workout mission is waiting. No excuses! 🏋️", enabled:true },
      { id:"r4", label:"Evening log",       time:"20:00", message:"Evening debrief — log your dinner and check today's XP. 🌙", enabled:true },
      { id:"r5", label:"Water reminder",    time:"15:00", message:"Hydration check! How many glasses today? 💧", enabled:false },
    ];

    // ─── HELPERS ─────────────────────────────────────────────────────────────

    function todayKey() { return new Date().toISOString().split("T")[0]; }
    function pick(arr, seed) { return arr[Math.abs(seed) % arr.length]; }
    function dayOfYear() {
      const n = new Date(), s = new Date(n.getFullYear(),0,0);
      return Math.floor((n-s)/86400000);
    }
    function getRank(xp) {
      let r = RANKS[0];
      for (const rr of RANKS) { if (xp >= rr.min) r = rr; }
      return r;
    }
    function getNextRank(xp) { return RANKS.find(r => r.min > xp) || null; }

    function useLS(key, init) {
      const [val, setVal] = useState(init);

      useEffect(() => {

        try {

          if (typeof window === "undefined") return;

          const s = window.localStorage.getItem(key);

          if (s !== null) setVal(JSON.parse(s));

        } catch {

          // ignore storage errors on Safari/private mode

        }

      }, [key]);

      const set = useCallback((v) => {

        setVal((prev) => {

          const next = typeof v === "function" ? v(prev) : v;

          try {

            if (typeof window !== "undefined") {

              window.localStorage.setItem(key, JSON.stringify(next));

            }

          } catch {

            // ignore storage errors

          }

          return next;

        });

      }, [key]);

      return [val, set];
    }

    // ─── NOTIFICATION ENGINE ──────────────────────────────────────────────────

    function useNotifications(reminders) {
      const [permission, setPermission] = useState(Notification.permission);
      const timers = useRef([]);

      const requestPermission = async () => {
        const result = await Notification.requestPermission();
        setPermission(result);
        return result;
      };

      const sendNow = (title, body) => {
        if (Notification.permission !== "granted") return;
        if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({
            type: "SHOW_NOTIFICATION", title, body
          });
        } else {
          new Notification(title, { body, icon: "/icon-192.png" });
        }
      };

      // Schedule daily reminders using setTimeout (fires on current day)
      useEffect(() => {
        if (Notification.permission !== "granted") return;
        timers.current.forEach(clearTimeout);
        timers.current = [];

        reminders.filter(r => r.enabled).forEach(r => {
          const [h, m] = r.time.split(":").map(Number);
          const now = new Date();
          const fire = new Date();
          fire.setHours(h, m, 0, 0);
          let ms = fire - now;
          if (ms < 0) ms += 86400000; // next day if already past

          const id = setTimeout(() => {
            new Notification("Mission Control", {
              body: r.message,
              icon: "/icon-192.png",
              tag: r.id,
            });
          }, ms);
          timers.current.push(id);
        });

        return () => timers.current.forEach(clearTimeout);
      }, [reminders, permission]);

      return { permission, requestPermission, sendNow };
    }

    // ─── COMPONENTS ──────────────────────────────────────────────────────────

    const S = {
      card: { background:"var(--card)", borderRadius:14, padding:"16px 18px", marginBottom:12 },
      label: { fontFamily:"var(--font-display)", fontSize:12, color:"var(--muted)", letterSpacing:1.5, marginBottom:8, display:"block" },
      row: { display:"flex", justifyContent:"space-between", alignItems:"center" },
    };

    function XPBar({ xp }) {
      const rank = getRank(xp), next = getNextRank(xp);
      const pct = next ? Math.round(((xp - rank.min)/(next.min - rank.min))*100) : 100;
      return (
        <div style={{...S.card, marginBottom:16}}>
          <div style={{...S.row, marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:24}}>{rank.icon}</span>
              <span style={{fontFamily:"var(--font-display)",fontSize:22,color:"var(--accent)",letterSpacing:1}}>{rank.name}</span>
            </div>
            <span style={{fontFamily:"var(--font-display)",fontSize:15,color:"var(--muted)"}}>{xp.toLocaleString()} XP</span>
          </div>
          <div style={{background:"var(--bg)",borderRadius:8,height:10,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,var(--accent),var(--accent2))",borderRadius:8,transition:"width 0.6s ease"}}/>
          </div>
          {next && <div style={{marginTop:5,fontSize:11,color:"var(--muted)",textAlign:"right"}}>{next.icon} {next.name} at {next.min.toLocaleString()} XP</div>}
        </div>
      );
    }

    function MealCard({ meal, done, onToggle }) {
      return (
        <div onClick={onToggle} style={{
          background: done?"var(--card-active)":"var(--card)",
          border:`1.5px solid ${done?"var(--accent)":"var(--border)"}`,
          borderRadius:14, padding:"14px 16px", cursor:"pointer",
          transition:"all 0.2s", marginBottom:8, position:"relative",
        }}>
          {done && <div style={{position:"absolute",top:10,right:12,background:"var(--accent)",color:"#000",borderRadius:20,padding:"2px 9px",fontSize:10,fontFamily:"var(--font-display)",letterSpacing:1}}>✓ +{XP.meal}XP</div>}
          <div style={{fontFamily:"var(--font-display)",fontSize:15,color:done?"var(--accent)":"var(--text)",marginBottom:3,letterSpacing:0.5}}>{meal.name}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>{meal.desc}</div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"var(--accent)"}}>💪 {meal.protein}g</span>
            <span style={{fontSize:11,color:"var(--muted)"}}>🔥 {meal.kcal} kcal</span>
            <span style={{fontSize:11,color:"var(--muted)"}}>⏱ {meal.prep}</span>
          </div>
        </div>
      );
    }

    function WaterTracker({ count, onAdd, onRemove }) {
      return (
        <div style={S.card}>
          <div style={{...S.row,marginBottom:12}}>
            <span style={{fontFamily:"var(--font-display)",fontSize:14,color:"var(--accent2)",letterSpacing:1}}>💧 WATER</span>
            <span style={{fontFamily:"var(--font-display)",fontSize:13,color:"var(--muted)"}}>{count}/{TARGETS.water} glasses</span>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {Array.from({length:TARGETS.water}).map((_,i)=>(
              <div key={i} style={{width:32,height:32,borderRadius:7,background:i<count?"var(--accent2)":"var(--bg)",border:`1.5px solid ${i<count?"var(--accent2)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,transition:"all 0.2s"}}>
                {i<count?"💧":"○"}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onAdd} disabled={count>=TARGETS.water} style={{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",background:"var(--accent2)",color:"#fff",fontFamily:"var(--font-display)",fontSize:12,letterSpacing:1,opacity:count>=TARGETS.water?0.5:1}}>+ GLASS (+{XP.water} XP)</button>
            <button onClick={onRemove} disabled={count===0} style={{padding:"9px 14px",borderRadius:8,border:"1.5px solid var(--border)",cursor:"pointer",background:"transparent",color:"var(--muted)",fontFamily:"var(--font-display)",fontSize:12,opacity:count===0?0.4:1}}>−</button>
          </div>
        </div>
      );
    }

    function WorkoutCard({ workout, done, onToggle }) {
      const c = workout.type==="weights"?"var(--accent)":workout.type==="walk"?"var(--accent2)":"var(--muted)";
      return (
        <div style={{background:done?"var(--card-active)":"var(--card)",border:`1.5px solid ${done?c:"var(--border)"}`,borderRadius:14,padding:"16px",marginBottom:10}}>
          <div style={{...S.row,marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:26}}>{workout.icon}</span>
              <div>
                <div style={{fontFamily:"var(--font-display)",fontSize:17,color:c,letterSpacing:1}}>{workout.label}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>{workout.mission}</div>
              </div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
            {workout.exercises.map((ex,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",background:"var(--bg)",borderRadius:7,padding:"7px 10px"}}>
                <span style={{fontSize:12,color:"var(--text)"}}>{ex.name}</span>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:11,color:c,fontFamily:"var(--font-display)"}}>{ex.sets}</span>
                  <span style={{fontSize:11,color:"var(--muted)"}}>Rest {ex.rest}</span>
                </div>
              </div>
            ))}
          </div>
          <button onClick={onToggle} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",cursor:"pointer",background:done?"var(--accent)":"var(--bg)",color:done?"#000":"var(--muted)",fontFamily:"var(--font-display)",fontSize:12,letterSpacing:1,transition:"all 0.2s"}}>
            {done?`✓ MISSION COMPLETE  +${XP.workout} XP`:"MARK COMPLETE"}
          </button>
        </div>
      );
    }

    function NavTab({ label, active, onClick, icon }) {
      return (
        <button onClick={onClick} style={{flex:1,padding:"10px 4px",border:"none",cursor:"pointer",background:active?"var(--card)":"transparent",color:active?"var(--accent)":"var(--muted)",fontFamily:"var(--font-display)",fontSize:10,letterSpacing:1,borderTop:`2px solid ${active?"var(--accent)":"transparent"}`,transition:"all 0.2s"}}>
          <div style={{fontSize:16,marginBottom:2}}>{icon}</div>
          {label}
        </button>
      );
    }

    function ReminderRow({ reminder, onChange }) {
      return (
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:"var(--text)"}}>{reminder.label}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{reminder.time} · {reminder.message.slice(0,40)}…</div>
          </div>
          <label style={{position:"relative",display:"inline-block",width:40,height:22,cursor:"pointer"}}>
            <input type="checkbox" checked={reminder.enabled} onChange={e=>onChange({...reminder,enabled:e.target.checked})} style={{opacity:0,width:0,height:0}}/>
            <span style={{position:"absolute",inset:0,background:reminder.enabled?"var(--accent)":"var(--border)",borderRadius:22,transition:"0.2s"}}>
              <span style={{position:"absolute",width:16,height:16,top:3,left:reminder.enabled?20:3,background:"#fff",borderRadius:"50%",transition:"0.2s"}}/>
            </span>
          </label>
        </div>
      );
    }

    // ─── MAIN ─────────────────────────────────────────────────────────────────

    function App() {
      const [tab, setTab] = useState("dashboard");
      const [xp, setXp] = useLS("xp_v2", 0);
      const [streak, setStreak] = useLS("streak_v2", 0);
      const [lastActive, setLastActive] = useLS("last_active_v2", "");
      const [reminders, setReminders] = useLS("reminders_v2", DEFAULT_REMINDERS);
      const [installPrompt, setInstallPrompt] = useState(null);
      const [installed, setInstalled] = useState(false);
      const [toast, setToast] = useState(null);

      const today = todayKey();
      const [td, setTd] = useLS(`day_v2_${today}`, {meals:{},workout:false,walk:false,water:0});

      const { permission, requestPermission, sendNow } = useNotifications(reminders);

      // Streak
      useEffect(() => {
        if (lastActive !== today) {
          const yest = new Date(); yest.setDate(yest.getDate()-1);
          const yKey = yest.toISOString().split("T")[0];
          setStreak(s => lastActive===yKey ? s+1 : 1);
          setLastActive(today);
        }
      }, []);

      // PWA install prompt
      useEffect(() => {
        const handler = e => { e.preventDefault(); setInstallPrompt(e); };
        window.addEventListener("beforeinstallprompt", handler);
        window.addEventListener("appinstalled", () => setInstalled(true));
        return () => window.removeEventListener("beforeinstallprompt", handler);
      }, []);

      // Service worker registration
      useEffect(() => {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/sw.js").catch(console.error);
        }
      }, []);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      // Derived
      const doy = dayOfYear();
      const dayIdx = new Date().getDay();
      const todayWorkout = WORKOUTS[dayIdx === 0 ? 6 : dayIdx - 1];

      const todayPlan = {
        breakfast: pick(MEALS.breakfast, doy),
        lunch:     pick(MEALS.lunch,     doy+7),
        dinner:    pick(MEALS.dinner,    doy+13),
        snack:     pick(MEALS.snack,     doy+3),
      };

      const loggedMeals = Object.entries(td.meals).filter(([,v])=>v);
      const proteinLogged = loggedMeals.reduce((acc,[id])=>{
        for (const cat of Object.values(MEALS)) { const m=cat.find(x=>x.id===id); if(m) acc+=m.protein; }
        return acc;
      },0);
      const kcalLogged = loggedMeals.reduce((acc,[id])=>{
        for (const cat of Object.values(MEALS)) { const m=cat.find(x=>x.id===id); if(m) acc+=m.kcal; }
        return acc;
      },0);
      const totalMeals = Object.keys(MEALS).length;

      const addXp = useCallback(n => setXp(x=>x+n), []);
      const subXp = useCallback(n => setXp(x=>Math.max(0,x-n)), []);

      const toggleMeal = (id) => {
        const prev = td.meals[id];
        setTd(d=>({...d,meals:{...d.meals,[id]:!prev}}));
        if(!prev){ addXp(XP.meal); showToast(`+${XP.meal} XP — Meal logged!`); }
        else subXp(XP.meal);
      };
      const toggleWorkout = () => {
        setTd(d=>({...d,workout:!d.workout}));
        if(!td.workout){ addXp(XP.workout); showToast(`+${XP.workout} XP — Mission complete!`); }
        else subXp(XP.workout);
      };
      const toggleWalk = () => {
        setTd(d=>({...d,walk:!d.walk}));
        if(!td.walk){ addXp(XP.walk); showToast(`+${XP.walk} XP — Walk logged!`); }
        else subXp(XP.walk);
      };
      const addWater = () => {
        if(td.water>=TARGETS.water) return;
        setTd(d=>({...d,water:d.water+1}));
        addXp(XP.water);
      };
      const removeWater = () => {
        if(td.water<=0) return;
        setTd(d=>({...d,water:d.water-1}));
        subXp(XP.water);
      };

      const todayXP = (loggedMeals.length*XP.meal)+(td.workout?XP.workout:0)+(td.walk?XP.walk:0)+(td.water*XP.water);

      return (
        <div style={{maxWidth:480,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",position:"relative"}}>

          {/* Toast */}
          {toast && (
            <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"var(--accent)",color:"#000",padding:"10px 20px",borderRadius:30,fontFamily:"var(--font-display)",fontSize:13,letterSpacing:1,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>
              {toast}
            </div>
          )}

          {/* Header */}
          <div style={{padding:"env(safe-area-inset-top,16px) 18px 12px",background:"var(--bg)",borderBottom:"1px solid var(--border)",flexShrink:0}}>
            <div style={{paddingTop:8,...S.row}}>
              <div>
                <div style={{fontFamily:"var(--font-display)",fontSize:26,letterSpacing:2,color:"var(--accent)",lineHeight:1}}>MISSION</div>
                <div style={{fontFamily:"var(--font-display)",fontSize:26,letterSpacing:2,color:"var(--text)",lineHeight:1}}>CONTROL</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-display)",letterSpacing:1}}>
                  {new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}).toUpperCase()}
                </div>
                <div style={{fontFamily:"var(--font-display)",fontSize:20,color:"var(--accent)",marginTop:2}}>{streak} 🔥</div>
              </div>
            </div>
          </div>

          {/* Nav */}
          <div style={{display:"flex",borderBottom:"1px solid var(--border)",flexShrink:0}}>
            <NavTab label="HOME"     icon="📊" active={tab==="dashboard"} onClick={()=>setTab("dashboard")}/>
            <NavTab label="MEALS"    icon="🍽️" active={tab==="meals"}     onClick={()=>setTab("meals")}/>
            <NavTab label="WORKOUT"  icon="🏋️" active={tab==="workouts"}  onClick={()=>setTab("workouts")}/>
            <NavTab label="ALERTS"   icon="🔔" active={tab==="notifs"}    onClick={()=>setTab("notifs")}/>
            <NavTab label="RANKS"    icon="🏆" active={tab==="history"}   onClick={()=>setTab("history")}/>
          </div>

          {/* Scroll content */}
          <div style={{flex:1,overflowY:"auto",padding:"16px 14px",paddingBottom:`calc(20px + var(--safe-bottom))`}}>

            {/* ── DASHBOARD ── */}
            {tab==="dashboard" && (
              <div>
                <XPBar xp={xp}/>

                {/* Install banner */}
                {installPrompt && !installed && (
                  <div style={{...S.card,background:"#1a1f2e",border:"1.5px solid var(--accent2)",display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:24}}>📲</span>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"var(--font-display)",fontSize:13,color:"var(--accent2)",letterSpacing:1}}>INSTALL APP</div>
                      <div style={{fontSize:11,color:"var(--muted)"}}>Add to home screen for full access</div>
                    </div>
                    <button onClick={async()=>{installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==="accepted")setInstalled(true);}} style={{padding:"7px 14px",borderRadius:8,border:"none",background:"var(--accent2)",color:"#fff",fontFamily:"var(--font-display)",fontSize:11,letterSpacing:1,cursor:"pointer"}}>INSTALL</button>
                  </div>
                )}

                {/* Stats row */}
                <div style={{display:"flex",gap:10,marginBottom:12}}>
                  {[
                    {label:"TODAY XP",   val:todayXP,             unit:"xp",  color:"var(--accent)"},
                    {label:"PROTEIN",    val:proteinLogged,        unit:"g",   color:"var(--accent)"},
                    {label:"CALORIES",   val:kcalLogged,           unit:"",    color:"var(--accent2)"},
                  ].map((s,i)=>(
                    <div key={i} style={{...S.card,flex:1,margin:0,textAlign:"center",padding:"12px 8px"}}>
                      <div style={{fontFamily:"var(--font-display)",fontSize:22,color:s.color}}>{s.val}<span style={{fontSize:11,color:"var(--muted)"}}>{s.unit}</span></div>
                      <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-display)",letterSpacing:1,marginTop:3}}>{s.label}</div>
                    </div>
                  ))}
                </div>

                <WaterTracker count={td.water} onAdd={addWater} onRemove={removeWater}/>

                {/* Today's mission */}
                <div style={S.card}>
                  <span style={S.label}>TODAY'S MISSION</span>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <span style={{fontSize:30}}>{todayWorkout.icon}</span>
                    <div>
                      <div style={{fontFamily:"var(--font-display)",fontSize:18,color:"var(--accent)",letterSpacing:1}}>{todayWorkout.label}</div>
                      <div style={{fontSize:12,color:"var(--muted)"}}>{todayWorkout.mission}</div>
                    </div>
                  </div>
                  <button onClick={()=>setTab("workouts")} style={{width:"100%",padding:"9px",borderRadius:9,border:"1.5px solid var(--accent)",background:"transparent",color:"var(--accent)",fontFamily:"var(--font-display)",fontSize:12,letterSpacing:1,cursor:"pointer"}}>
                    VIEW FULL WORKOUT →
                  </button>
                </div>

                {/* Walk */}
                <div onClick={toggleWalk} style={{...S.card,cursor:"pointer",border:`1.5px solid ${td.walk?"var(--accent2)":"var(--border)"}`,background:td.walk?"var(--card-active)":"var(--card)",...S.row}}>
                  <div>
                    <div style={{fontFamily:"var(--font-display)",fontSize:14,color:td.walk?"var(--accent2)":"var(--text)",letterSpacing:1}}>🚶 DAILY WALK</div>
                    <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>30+ min brisk walk</div>
                  </div>
                  <div style={{fontFamily:"var(--font-display)",fontSize:13,color:td.walk?"var(--accent2)":"var(--muted)"}}>{td.walk?`✓ +${XP.walk}XP`:"LOG"}</div>
                </div>

                {/* Today's meals snapshot */}
                <div style={S.card}>
                  <span style={S.label}>TODAY'S RATIONS</span>
                  {Object.entries(todayPlan).map(([cat,meal])=>(
                    <div key={meal.id} onClick={()=>toggleMeal(meal.id)} style={{display:"flex",...S.row,padding:"8px 0",borderBottom:"1px solid var(--border)",cursor:"pointer"}}>
                      <div>
                        <div style={{fontSize:13,color:td.meals[meal.id]?"var(--accent)":"var(--text)"}}>{meal.name}</div>
                        <div style={{fontSize:11,color:"var(--muted)",textTransform:"capitalize"}}>{cat} · {meal.protein}g protein</div>
                      </div>
                      <span style={{fontSize:16}}>{td.meals[meal.id]?"✅":"⬜"}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── MEALS ── */}
            {tab==="meals" && (
              <div>
                <span style={S.label}>TODAY'S MEAL PLAN — tap to log</span>
                {[
                  {label:"☀️ BREAKFAST", meal:todayPlan.breakfast},
                  {label:"🌤 LUNCH",      meal:todayPlan.lunch},
                  {label:"🌙 DINNER",     meal:todayPlan.dinner},
                  {label:"⚡ SNACK",      meal:todayPlan.snack},
                ].map(({label,meal})=>(
                  <div key={meal.id} style={{marginBottom:16}}>
                    <span style={S.label}>{label}</span>
                    <MealCard meal={meal} done={!!td.meals[meal.id]} onToggle={()=>toggleMeal(meal.id)}/>
                  </div>
                ))}

                <div style={{...S.card,marginTop:8}}>
                  <span style={S.label}>DAILY SUMMARY</span>
                  {[
                    {l:"Protein",      v:`${proteinLogged}g / ${TARGETS.protein}g`,  c:"var(--accent)"},
                    {l:"Calories",     v:`${kcalLogged} / ${TARGETS.kcal} kcal`,    c:"var(--accent2)"},
                    {l:"Meals logged", v:`${loggedMeals.length} / ${totalMeals}`,   c:"var(--text)"},
                  ].map((r,i)=>(
                    <div key={i} style={{...S.row,padding:"7px 0",borderBottom:i<2?"1px solid var(--border)":"none"}}>
                      <span style={{fontSize:12,color:"var(--muted)"}}>{r.l}</span>
                      <span style={{fontFamily:"var(--font-display)",fontSize:13,color:r.c}}>{r.v}</span>
                    </div>
                  ))}
                </div>

                {/* All options */}
                <div style={{marginTop:20}}>
                  <span style={S.label}>ALL MEAL OPTIONS</span>
                  {Object.entries(MEALS).map(([cat,meals])=>(
                    <div key={cat} style={{marginBottom:16}}>
                      <span style={{...S.label,color:"var(--accent)"}}>{cat.toUpperCase()}</span>
                      {meals.map(m=><MealCard key={m.id} meal={m} done={!!td.meals[m.id]} onToggle={()=>toggleMeal(m.id)}/>)}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── WORKOUTS ── */}
            {tab==="workouts" && (
              <div>
                <span style={S.label}>TODAY'S MISSION</span>
                <WorkoutCard workout={todayWorkout} done={td.workout} onToggle={toggleWorkout}/>

                <div onClick={toggleWalk} style={{...S.card,cursor:"pointer",border:`1.5px solid ${td.walk?"var(--accent2)":"var(--border)"}`,background:td.walk?"var(--card-active)":"var(--card)",...S.row,marginBottom:16}}>
                  <div>
                    <div style={{fontFamily:"var(--font-display)",fontSize:14,color:td.walk?"var(--accent2)":"var(--text)",letterSpacing:1}}>🚶 DAILY WALK</div>
                    <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>30–45 min brisk walk</div>
                  </div>
                  <div style={{fontFamily:"var(--font-display)",color:td.walk?"var(--accent2)":"var(--muted)",fontSize:13}}>{td.walk?`✓ +${XP.walk}XP`:"LOG WALK"}</div>
                </div>

                <span style={S.label}>FULL WEEK SCHEDULE</span>
                {WORKOUTS.map(w=>(
                  <div key={w.id} style={{...S.card,border:`1px solid ${w.id===todayWorkout.id?"var(--accent)":"var(--border)"}`,...S.row}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20}}>{w.icon}</span>
                      <div>
                        <div style={{fontFamily:"var(--font-display)",fontSize:13,color:w.id===todayWorkout.id?"var(--accent)":"var(--text)",letterSpacing:1}}>{w.label}</div>
                        <div style={{fontSize:11,color:"var(--muted)"}}>{w.mission}</div>
                      </div>
                    </div>
                    <span style={{fontSize:11,fontFamily:"var(--font-display)",color:"var(--muted)"}}>{w.day.slice(0,3).toUpperCase()}</span>
                  </div>
                ))}
              </div>
            )}

            {/* ── NOTIFICATIONS ── */}
            {tab==="notifs" && (
              <div>
                <span style={S.label}>NOTIFICATION SETTINGS</span>

                {/* Permission status */}
                <div style={{...S.card,border:`1.5px solid ${permission==="granted"?"var(--accent)":permission==="denied"?"var(--danger)":"var(--border)"}`}}>
                  <div style={{...S.row,marginBottom:12}}>
                    <div>
                      <div style={{fontFamily:"var(--font-display)",fontSize:14,color:permission==="granted"?"var(--accent)":permission==="denied"?"var(--danger)":"var(--text)",letterSpacing:1}}>
                        {permission==="granted"?"✓ NOTIFICATIONS ON":permission==="denied"?"✗ BLOCKED":"NOTIFICATIONS OFF"}
                      </div>
                      <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>
                        {permission==="granted"?"Reminders will fire at scheduled times":permission==="denied"?"Enable in your browser/phone settings":"Tap to enable daily mission reminders"}
                      </div>
                    </div>
                    <span style={{fontSize:24}}>{permission==="granted"?"🔔":permission==="denied"?"🔕":"🔔"}</span>
                  </div>
                  {permission !== "granted" && permission !== "denied" && (
                    <button onClick={async()=>{const r=await requestPermission();if(r==="granted")showToast("Notifications enabled!");}} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:"var(--accent)",color:"#000",fontFamily:"var(--font-display)",fontSize:13,letterSpacing:1,cursor:"pointer"}}>
                      ENABLE NOTIFICATIONS
                    </button>
                  )}
                  {permission==="denied" && (
                    <div style={{fontSize:11,color:"var(--danger)",marginTop:8}}>
                      To enable: go to your browser Settings → Site permissions → Notifications → Allow for this site.
                    </div>
                  )}
                </div>

                {/* Test button */}
                {permission==="granted" && (
                  <button onClick={()=>sendNow("Mission Control","Test notification — your system is operational! 🎯")} style={{width:"100%",padding:"10px",borderRadius:9,border:"1.5px solid var(--accent)",background:"transparent",color:"var(--accent)",fontFamily:"var(--font-display)",fontSize:12,letterSpacing:1,cursor:"pointer",marginBottom:12}}>
                    SEND TEST NOTIFICATION
                  </button>
                )}

                {/* Install app CTA */}
                {!installed && (
                  <div style={{...S.card,background:"#111827",border:"1px solid var(--border)"}}>
                    <div style={{fontFamily:"var(--font-display)",fontSize:13,color:"var(--accent2)",letterSpacing:1,marginBottom:6}}>📲 INSTALL FOR BEST EXPERIENCE</div>
                    <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.6}}>
                      For reliable notifications, install this app to your home screen. On iOS: tap the Share button → "Add to Home Screen". On Android: tap the menu → "Add to Home Screen" or use the install button on the Home tab.
                    </div>
                  </div>
                )}

                {/* Reminder list */}
                <div style={S.card}>
                  <span style={S.label}>DAILY REMINDERS</span>
                  {reminders.map(r=>(
                    <ReminderRow key={r.id} reminder={r} onChange={updated=>setReminders(rs=>rs.map(x=>x.id===r.id?updated:x))}/>
                  ))}
                </div>

                <div style={{...S.card,background:"#111827",border:"1px solid var(--border)"}}>
                  <div style={{fontFamily:"var(--font-display)",fontSize:12,color:"var(--muted)",letterSpacing:1,marginBottom:6}}>HOW REMINDERS WORK</div>
                  <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>
                    Reminders fire at the scheduled time while this app is open or installed on your home screen. For background notifications on iOS, the app must be installed via "Add to Home Screen". Timers reset if you close the browser tab — installing removes this limitation.
                  </div>
                </div>
              </div>
            )}

            {/* ── RANKS / HISTORY ── */}
            {tab==="history" && (
              <div>
                <span style={S.label}>RANK PROGRESSION</span>
                {RANKS.map((r,i)=>{
                  const earned = xp>=r.min;
                  return (
                    <div key={i} style={{...S.card,border:`1px solid ${earned?"var(--accent)":"var(--border)"}`,background:earned?"rgba(168,224,99,0.05)":"var(--card)",...S.row}}>
                      <div style={{display:"flex",gap:12,alignItems:"center"}}>
                        <span style={{fontSize:22,opacity:earned?1:0.3}}>{r.icon}</span>
                        <div>
                          <div style={{fontFamily:"var(--font-display)",fontSize:15,color:earned?"var(--text)":"var(--muted)",letterSpacing:1}}>{r.name}</div>
                          <div style={{fontSize:11,color:"var(--muted)"}}>{r.min.toLocaleString()} XP to unlock</div>
                        </div>
                      </div>
                      <span style={{fontFamily:"var(--font-display)",fontSize:12,color:earned?"var(--accent)":"var(--muted)"}}>{earned?"✓ UNLOCKED":"LOCKED"}</span>
                    </div>
                  );
                })}

                <div style={{...S.card,marginTop:8}}>
                  <span style={S.label}>XP BREAKDOWN</span>
                  {[
                    {icon:"🍽️",label:"Each meal logged",   pts:XP.meal},
                    {icon:"🏋️",label:"Workout complete",   pts:XP.workout},
                    {icon:"🚶",label:"Daily walk",          pts:XP.walk},
                    {icon:"💧",label:"Glass of water",      pts:XP.water},
                  ].map((r,i)=>(
                    <div key={i} style={{...S.row,padding:"8px 0",borderBottom:i<3?"1px solid var(--border)":"none"}}>
                      <span style={{fontSize:13,color:"var(--text)"}}>{r.icon} {r.label}</span>
                      <span style={{fontFamily:"var(--font-display)",fontSize:13,color:"var(--accent)"}}>+{r.pts} XP</span>
                    </div>
                  ))}
                  <div style={{marginTop:12,padding:"10px",background:"var(--bg)",borderRadius:9,textAlign:"center"}}>
                    <div style={{fontFamily:"var(--font-display)",fontSize:11,color:"var(--muted)",letterSpacing:1}}>MAX DAILY XP</div>
                    <div style={{fontFamily:"var(--font-display)",fontSize:24,color:"var(--accent)"}}>
                      {(totalMeals*XP.meal)+XP.workout+XP.walk+(TARGETS.water*XP.water)}
                    </div>
                  </div>
                </div>

                <div style={{marginTop:16,textAlign:"center"}}>
                  <button onClick={()=>{if(window.confirm("Reset ALL progress?")) {setXp(0);setStreak(0);setLastActive("");setTd({meals:{},workout:false,walk:false,water:0});}}} style={{padding:"8px 18px",borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--muted)",fontFamily:"var(--font-display)",fontSize:11,letterSpacing:1,cursor:"pointer"}}>RESET PROGRESS</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
